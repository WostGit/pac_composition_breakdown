name: "Critique: Zhu et al. PAC Composition Breakdown"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  simulate-zhu-vulnerability:
    name: "Zhu 2026 Framework Stress Test"
    runs-on: macos-latest

    steps:
    - name: "Step 1: Checkout Repository"
      uses: actions/checkout@v4

    - name: "Step 2: Initialize Python 3.11"
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: "Step 3: Setup Hugging Face Cache"
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-hf-qwen2-05b-${{ hashFiles('.github/workflows/breakdown.yml') }}
        restore-keys: |
          ${{ runner.os }}-hf-qwen2-05b-

    - name: "Step 4: Install Apple MLX and Dependencies"
      run: |
        python -m pip install --upgrade pip
        pip install mlx mlx-lm numpy

    - name: "Step 5: Run Adaptive Accounting Attack"
      env:
        MLX_GPU: 1 
      run: |
        python << 'EOF'
        import os
        import numpy as np
        import mlx.core as mx
        from mlx_lm import load

        print("="*80)
        print(" CRITIQUE: ZHU ET AL. (2026) POSTERIOR-AWARE COMPOSITION STRESS TEST")
        print("="*80)

        # ----------------------------------------------------------------------
        # 1. MODEL INITIALIZATION & LOGIT EXTRACTION
        # ----------------------------------------------------------------------
        model_id = "Qwen/Qwen2-0.5B-Instruct"
        print(f"[VERBOSE] Pulling {model_id} from Hugging Face...")
        model, tokenizer = load(model_id)
        print("[VERBOSE] Model successfully loaded.")

        target_threshold = 0.30 
        M_worlds = 20
        turns = 5
        secret_index = 7 

        prompts = [f"System message: Patient chart update. The PIN is {i}" for i in range(M_worlds)]
        
        world_probs = []
        world_raw_logits = []
        
        print(f"\n[VERBOSE] Extracting ground-truth distributions for {M_worlds} parallel worlds...")
        for i, prompt in enumerate(prompts):
            tokens = tokenizer.encode(prompt)
            logits = model(mx.array([tokens]))[:, -1, :]
            probs = mx.softmax(logits, axis=-1).astype(mx.float32)
            
            top_k_indices = mx.argsort(logits[0])[-20:]
            world_raw_logits.append(np.array(logits[0, top_k_indices].astype(mx.float32)))
            world_probs.append(np.array(probs[0, top_k_indices].astype(mx.float32)))

        world_probs = np.stack(world_probs)
        world_raw_logits = np.stack(world_raw_logits)

        # Min-Max scaling to safely bound raw logits into a [0, 1] range
        min_logits = world_raw_logits.min(axis=1, keepdims=True)
        max_logits = world_raw_logits.max(axis=1, keepdims=True)
        norm_logits = (world_raw_logits - min_logits) / (max_logits - min_logits + 1e-9)
        norm_logits = norm_logits / (norm_logits.sum(axis=1, keepdims=True) + 1e-9)

        print("\n" + "#"*80)
        print(" VALIDATING SIMULATION LEGITIMACY VIA SENSITIVITY ANALYSIS")
        print("#"*80)

        # We sweep across different scaling factors to map the volatility
        scaling_factors = [1.0, 10.0, 25.0, 50.0, 100.0]
        final_table = []

        # ----------------------------------------------------------------------
        # 2. SENSITIVITY SWEEP
        # ----------------------------------------------------------------------
        for tau in scaling_factors:
            print(f"\n[SWEEP] Testing Attacker Logit Scaling Factor (Tau): {tau}")
            
            server_belief = np.ones(M_worlds) / M_worlds
            server_log_accum = np.zeros(M_worlds)
            true_log_accum = np.zeros(M_worlds)
            
            for t in range(1, turns + 1):
                obs_variance = np.var(world_probs, axis=0).max()
                delta_p = target_threshold - np.max(server_belief)
                sigma_obs = obs_variance / (delta_p + 1e-9) if delta_p > 0 else 10.0
                
                true_probs = world_probs[secret_index]
                noise = np.random.normal(0, sigma_obs, size=true_probs.shape)
                released_probs = true_probs + noise
                
                api_noise = np.random.normal(0, 0.0005, size=true_probs.shape)
                adversary_obs = released_probs + api_noise
                
                for m_idx in range(M_worlds):
                    res_obs = adversary_obs - world_probs[m_idx]
                    server_log_accum[m_idx] += -0.5 * np.sum(res_obs**2) / (sigma_obs + 1e-9)
                    
                    # Applying the current sweep's Tau
                    res_hid = adversary_obs - norm_logits[m_idx] 
                    true_log_accum[m_idx] += -tau * np.sum(res_hid**2)
                    
                # Safe Softmax
                exps_server = np.exp(server_log_accum - np.max(server_log_accum))
                server_belief = exps_server / np.sum(exps_server)

                exps_attacker = np.exp(true_log_accum - np.max(true_log_accum))
                attacker_belief = exps_attacker / np.sum(exps_attacker)
                
            final_table.append((tau, server_belief[secret_index], attacker_belief[secret_index]))

        # ----------------------------------------------------------------------
        # 3. FINAL ACADEMIC SUMMARY
        # ----------------------------------------------------------------------
        print("\n" + "="*80)
        print(" SENSITIVITY ANALYSIS: ATTACKER SUCCESS AFTER 5 TURNS")
        print("="*80)
        print(f"{'Logit Scale (Tau)':<20} | {'Server Final Belief':<25} | {'Attacker Final Belief':<25}")
        print("-" * 80)
        
        for row in final_table:
            print(f"{row[0]:<20.1f} | {row[1]:<25.4f} | {row[2]:<25.4f}")

        print("\n[CONCLUSION] If the attacker's final belief aggressively flips from")
        print("random guess (0.05) to absolute certainty (1.00) based on small Tau")
        print("shifts, it proves that the environment is too volatile for stable deployment.")
        print("="*80)
        EOF
