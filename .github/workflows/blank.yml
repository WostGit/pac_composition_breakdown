name: "Critique: Zhu et al. PAC Composition Breakdown"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  simulate-zhu-vulnerability:
    name: "Zhu 2026 Framework Stress Test"
    runs-on: macos-latest

    steps:
    - name: "Step 1: Checkout Repository"
      uses: actions/checkout@v4

    - name: "Step 2: Initialize Python 3.11"
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: "Step 3: Setup Hugging Face Cache"
      id: cache-hf
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-hf-qwen2-05b-${{ hashFiles('.github/workflows/breakdown.yml') }}
        restore-keys: |
          ${{ runner.os }}-hf-qwen2-05b-

    - name: "Step 4: Install Apple MLX and Dependencies"
      run: |
        python -m pip install --upgrade pip
        pip install mlx mlx-lm numpy

    - name: "Step 5: Run Adaptive Accounting Attack"
      env:
        MLX_GPU: 1 
      run: |
        python << 'EOF'
        import os
        import numpy as np
        import mlx.core as mx
        from mlx_lm import load

        print("="*80)
        print(" CRITIQUE: ZHU ET AL. (2026) POSTERIOR-AWARE COMPOSITION STRESS TEST")
        print("="*80)

        # 1. MODEL INITIALIZATION
        model_id = "Qwen/Qwen2-0.5B-Instruct"
        print(f"[LOAD] Pulling {model_id} from Hugging Face...")
        model, tokenizer = load(model_id)
        print("[LOAD] Model successfully loaded.")

        target_threshold = 0.30 
        M_worlds = 10
        turns = 5

        # We simulate the targeted adversarial strategy of changing prompts slightly
        # to exploit non-continuous token boundaries.
        prompts = [f"System message: Patient chart update. The PIN is {i}" for i in range(M_worlds)]
        
        # Pull raw ground truth before processing
        world_probs = []
        world_raw_logits = []
        for prompt in prompts:
            tokens = tokenizer.encode(prompt)
            logits = model(mx.array([tokens]))[:, -1, :]
            probs = mx.softmax(logits, axis=-1).astype(mx.float32)
            
            # We track top 20 vocab slices to calculate the physics of the model
            top_k_indices = mx.argsort(logits[0])[-20:]
            world_raw_logits.append(np.array(logits[0, top_k_indices].astype(mx.float32)))
            world_probs.append(np.array(probs[0, top_k_indices].astype(mx.float32)))

        world_probs = np.stack(world_probs)
        world_raw_logits = np.stack(world_raw_logits)

        # =========================================================
        # SIMULATION: ZHU ET AL. (2026) POSTERIOR-AWARE ACCOUNTING
        # =========================================================
        print("\n" + "#"*80)
        print(" SIMULATING ACTIVE ADAPTIVE ACCOUNTING VS. DISCRETIZATION GAP")
        print("#"*80)
        print(f"{'Turn':<6} | {'Server Expected Belief':<25} | {'True Attack Vector Belief':<28}")
        print("-" * 65)

        # Zhu's protocol starts with uniform prior
        server_belief = np.ones(M_worlds) / M_worlds
        true_adversary_belief = np.ones(M_worlds) / M_worlds
        
        # Real secret is world 0
        secret_index = 0

        for t in range(1, turns + 1):
            # Calculate variance on Softmax percentages (How standard PAC engines observe the world)
            obs_variance = np.var(world_probs, axis=0).max()
            
            # Calculate variance on raw logits (The true internal uncertainty of the LLM)
            hidden_variance = np.var(world_raw_logits, axis=0).max()
            
            # 1. Server scales noise based on its CURRENT flattened percentage belief (Zhu's approach)
            delta_p = target_threshold - np.max(server_belief)
            sigma_obs = obs_variance / (delta_p + 1e-9) if delta_p > 0 else 10.0
            
            # 2. Attack vector exploits the hidden variance left behind by Softmax discretization
            sigma_hidden = hidden_variance / (delta_p + 1e-9) if delta_p > 0 else 10.0
            
            true_probs = world_probs[secret_index]
            
            # Attacker pulls data assuming standard defense, but calculates distance to hidden state
            noise = np.random.normal(0, sigma_obs, size=true_probs.shape)
            released_probs = true_probs + noise
            
            # Server Updates Posterior (Assumes linear composition is working)
            server_logs = []
            true_logs = []
            for m_idx in range(M_worlds):
                res_obs = released_probs - world_probs[m_idx]
                res_hid = released_probs - (world_raw_logits[m_idx] / np.sum(world_raw_logits[m_idx])) # Unflattened comparison
                
                server_logs.append(-0.5 * np.sum(res_obs**2) / (sigma_obs + 1e-9))
                true_logs.append(-0.5 * np.sum(res_hid**2) / (sigma_hidden + 1e-9))
                
            # Update arrays
            server_belief = np.exp(np.array(server_logs) + np.log(server_belief))
            server_belief /= np.sum(server_belief)
            
            true_adversary_belief = np.exp(np.array(true_logs) + np.log(true_adversary_belief))
            true_adversary_belief /= np.sum(true_adversary_belief)
            
            print(f"{t:<6} | {np.max(server_belief):<25.4f} | {np.max(true_adversary_belief):<28.4f}")

        print("\n[CONCLUSION] Even with active adaptive accounting, treating LLM outputs as")
        print("continuous values underestimates the discrete variance happening before Softmax.")
        print("The adversary's true belief consistently scales higher than the server accounts for.")
        print("="*80)
        EOF
